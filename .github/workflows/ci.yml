name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: sentinel_dev_password
          POSTGRES_DB: sentinelauth
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://sentinel:sentinel_dev_password@localhost:5432/sentinelauth
      DATABASE_APP_URL: postgresql://app_user:app_user_password@localhost:5432/sentinelauth
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
      GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
      GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
      GMAIL_SENDER: ar1062000a@gmail.com
      JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
      COOKIE_SECRET: ${{ secrets.COOKIE_SECRET}}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run migrations
        run: pnpm --filter @sentinelauth/api db:migrate

      - name: Setup app_user and RLS
        run: |
          PGPASSWORD=sentinel_dev_password psql -h localhost -U sentinel -d sentinelauth -f api/src/db/migrations/rls-policies.sql
          PGPASSWORD=sentinel_dev_password psql -h localhost -U sentinel -d sentinelauth -c "CREATE USER app_user WITH PASSWORD 'app_user_password';"
          PGPASSWORD=sentinel_dev_password psql -h localhost -U sentinel -d sentinelauth -c "GRANT CONNECT ON DATABASE sentinelauth TO app_user;"
          PGPASSWORD=sentinel_dev_password psql -h localhost -U sentinel -d sentinelauth -c "GRANT USAGE ON SCHEMA public TO app_user;"
          PGPASSWORD=sentinel_dev_password psql -h localhost -U sentinel -d sentinelauth -c "GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO app_user;"
          PGPASSWORD=sentinel_dev_password psql -h localhost -U sentinel -d sentinelauth -c "GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO app_user;"

      - name: Verify app_user can authenticate
        run: PGPASSWORD=app_user_password psql -h localhost -U app_user -d sentinelauth -c "SELECT 1"

      - name: Build packages
        run: pnpm --filter @sentinelauth/types build

      - name: Typecheck
        run: pnpm --filter @sentinelauth/api typecheck

      - name: Lint
        run: pnpm --filter @sentinelauth/api lint

      - name: Test
        run: pnpm --filter @sentinelauth/api test
